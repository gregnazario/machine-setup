# Package Categories
# Format: packages = package1,package2,...

[packages]
shell = nushell
editors = neovim
cli_essential = ripgrep fd-find fzf
multiplexer = zellij
cli_modern = bat eza dust bottom procs
utilities = jq httpie doggo gping rsync yazi ouch asciinema glow fastfetch
security = gnupg pass openssh
version_manager = mise
languages = python3 rustup
git = git gh
devops = docker kubectl

[package_mapping.fd-find]
ubuntu = fd-find
fedora = fd-find
debian = fd-find
void = fd
gentoo = sys-apps/fd
freebsd = fd-find
macos = fd
nixos = fd
windows = fd.find
termux = fd

[package_mapping.neovim]
gentoo = app-editors/neovim
freebsd = editors/neovim
termux = neovim

[package_mapping.nushell]
gentoo = app-shells/nushell-bin
freebsd = shells/nushell

[package_mapping.ripgrep]
gentoo = sys-apps/ripgrep
freebsd = textproc/ripgrep

[package_mapping.fzf]
gentoo = app-shells/fzf
freebsd = textproc/fzf

[package_mapping.restic]
gentoo = app-backup/restic
freebsd = sysutils/restic

[package_mapping.tailscale]
gentoo = net-vpn/tailscale
freebsd = net/tailscale
void = tailscale

[package_mapping.docker-compose]
ubuntu = docker-compose-plugin
debian = docker-compose-plugin
fedora = docker-compose-plugin
gentoo = app-containers/docker-compose
void = docker-compose
freebsd = sysutils/docker-compose
