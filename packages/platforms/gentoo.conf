[platform]
name = gentoo
package_manager = emerge

[features]
binpkg = true

[use_flags.global]
flags = X alsa pulseaudio systemd

[use_flags.package_specific.app-editors/neovim]
flags = lua python tree-sitter

[packages.base]
packages = dev-vcs/git dev-vcs/git-crypt app-crypt/gnupg net-p2p/syncthing

[platform_specific.1]
name = app-shells/nushell-bin
description = Modern shell (binary package)
accept_keywords = true

[platform_specific.2]
name = app-editors/neovim
description = Modern text editor

[platform_specific.3]
name = app-shells/fzf
description = Fuzzy finder

[platform_specific.4]
name = sys-apps/ripgrep
description = Fast grep

[platform_specific.5]
name = sys-apps/fd
description = Fast find

[services]
enable = docker syncthing

[make_conf]
FEATURES = binpkg getbinpkg
ACCEPT_KEYWORDS = ~amd64

[portage_dirs]
dirs = /etc/portage/package.use /etc/portage/package.accept_keywords
