platform: gentoo
package_manager: emerge

features:
  binpkg: true
  use_flags:
    global:
      - X
      - alsa
      - pulseaudio
      - systemd
    package_specific:
      app-editors/neovim:
        - lua
        - python
        - tree-sitter

packages:
  base:
    - dev-vcs/git
    - dev-vcs/git-crypt
    - app-crypt/gnupg
    - net-p2p/syncthing

platform_specific:
  - name: app-shells/nushell-bin
    description: Modern shell (binary package)
    accept_keywords: true
  - name: app-editors/neovim
    description: Modern text editor
  - name: app-shells/fzf
    description: Fuzzy finder
  - name: sys-apps/ripgrep
    description: Fast grep
  - name: sys-apps/fd
    description: Fast find

services:
  - docker
  - syncthing

make_conf:
  FEATURES: "binpkg getbinpkg"
  ACCEPT_KEYWORDS: "~amd64"

portage_dirs:
  - /etc/portage/package.use
  - /etc/portage/package.accept_keywords
