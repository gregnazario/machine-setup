platform: macos
package_manager: homebrew

packages:
  base:
    - git
    - git-crypt
    - gnupg
    - syncthing

platform_specific:
  - name: orbstack
    description: Docker Desktop alternative for macOS
    cask: true
  - name: rectangle
    description: Window manager
    cask: true

homebrew_taps:
  - homebrew/cask
  - homebrew/cask-fonts

homebrew_casks:
  - orbstack
  - rectangle
