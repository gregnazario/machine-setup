platform: ubuntu
package_manager: apt

packages:
  base:
    - git
    - git-crypt
    - gnupg
    - syncthing
    - build-essential
    - software-properties-common

platform_specific:
  - name: docker
    description: Docker CE
    repo: docker-ce
    gpg_key: https://download.docker.com/linux/ubuntu/gpg
    repo_url: "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"

services:
  - docker
  - syncthing

apt_repos:
  - name: docker
    gpg: https://download.docker.com/linux/ubuntu/gpg
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
