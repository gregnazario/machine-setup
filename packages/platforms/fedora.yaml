platform: fedora
package_manager: dnf

packages:
  base:
    - git
    - git-crypt
    - gnupg2
    - syncthing
    - "@development-tools"
    - dnf-plugins-core

platform_specific:
  - name: docker
    description: Docker CE
    repo: docker-ce-stable
    repo_url: https://download.docker.com/linux/fedora/docker-ce.repo

services:
  - docker
  - syncthing

dnf_repos:
  - name: docker-ce-stable
    url: https://download.docker.com/linux/fedora/docker-ce.repo
