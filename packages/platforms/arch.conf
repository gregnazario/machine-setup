[platform]
name = arch
package_manager = pacman

[packages.base]
packages = git git-crypt gnupg syncthing base-devel

[platform_specific.1]
name = pacman-contrib
description = Additional pacman tools

[services]
enable = sshd docker syncthing

[pacman_config]
parallel_downloads = 5
color = true
verbose_pkg_lists = true
ilovecandy = true

[aur]
helper = yay

[aur_packages.1]
name = mise
description = Runtime version manager

[aur_packages.2]
name = bottom-bin
description = System monitor (binary)
