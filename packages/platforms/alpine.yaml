platform: alpine
package_manager: apk

packages:
  base:
    - git
    - git-crypt
    - gnupg
    - syncthing
    - build-base
    - bash

platform_specific:
  - name: openrc
    description: Init system

services:
  - sshd
  - docker
  - syncthing
  - cronie

openrc_services:
  - sshd
  - docker
  - syncthing
  - cronie

apk_repos:
  - community
  - testing

features:
  musl: true
  edge: false
