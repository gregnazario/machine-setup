[platform]
name = macos
package_manager = homebrew

homebrew_taps = homebrew/cask-fonts

external_repos = orbstack

orbstack_repo = orbstack/orbstack-brew

orbstack_tap = orbstack/orbstack-brew

orbstack_cask = orbstack/orbstack-cask

orbstack_url = https://github.com/orbstack/orbstack
orbstack_description = OrbStack - Docker Desktop alternative

orbstack_app = OrbStack

orbstack_management_script = OrbStack Management

orbstack_script = orbstack/manage-vm.sh

orbstack_script_url = https://raw.githubusercontent.com/orbstack/orbstack/master/scripts/manage-vm.sh
orbstack_script_dest = /opt/orbstack/manage-vm.sh

orbstack_script_permissions = 0755
orbstack_sudo = true

orbstack_service = orbstack

[services]
enable = orbstack
enable = syncthing

enable_sshd = false

[platform_specific]
orbstack = OrbStack
