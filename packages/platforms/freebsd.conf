[platform]
name = freebsd
package_manager = pkg
ports_enabled = true

[packages.base]
packages = git git-crypt gnupg syncthing

[platform_specific.1]
name = bsdutils
description = FreeBSD-specific utilities
use_ports = false

[platform_specific.2]
name = sudo
description = Sudo utility
use_ports = false

[services]
enable = sshd syncthing

[ports_options.editors/neovim]
options = LUA PYTHON
