platform: void
package_manager: xbps

repos:
  - void-repo-nonfree
  - void-repo-multilib

packages:
  base:
    - git
    - git-crypt
    - gnupg
    - syncthing
    - base-devel

platform_specific:
  - name: void-repo-nonfree
    description: Non-free repository
  - name: void-repo-multilib
    description: Multilib repository

services:
  - sshd
  - docker
  - syncthing
  - cronie

runit_services:
  - sshd
  - docker
  - syncthing
  - cronie

xbps_config:
  base_system: void-lang-bash
