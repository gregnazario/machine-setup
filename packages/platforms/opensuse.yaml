platform: opensuse
package_manager: zypper

packages:
  base:
    - git
    - git-crypt
    - gnupg
    - syncthing
    - patterns-devel-base-devel_basis

platform_specific:
  - name: docker
    description: Docker CE
    repo: docker-ce-stable

services:
  - sshd
  - docker
  - syncthing

zypper_repos:
  - name: docker-ce-stable
    url: https://download.docker.com/linux/opensuse/leap/$releasever/stable
  - name: syncthing
    url: https://download.opensuse.org/repositories/network:/syncthing/openSUSE_Leap_$releasever/

patterns:
  - devel_basis
  - devel_C_C++
