# Profile: minimal
# Essential CLI tools only

[profile]
name = minimal
description = Essential CLI tools only - ideal for servers
extends = false

[packages]
shell = nushell
editors = neovim
cli_essential = ripgrep fd-find fzf
git = git
version_manager = mise
security = gnupg openssh git-crypt
sync = syncthing

[dotfiles]
source = profiles/minimal/

[dotfiles.links.1]
src = .config/nushell/
dest = ~/.config/nushell/

[dotfiles.links.2]
src = .config/nvim/
dest = ~/.config/nvim/

[dotfiles.links.3]
src = .gitconfig
dest = ~/.gitconfig

[dotfiles.links.4]
src = .ssh/config
dest = ~/.ssh/config

[services]
enable = sshd

[setup_scripts]
run = scripts/setup-ssh-agent.sh
