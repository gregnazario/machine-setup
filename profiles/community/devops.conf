# Profile: devops
# DevOps and infrastructure management

[profile]
name = devops
description = DevOps environment with containers, orchestration, and IaC tools
extends = full

[packages]
containers = docker docker-compose podman
orchestration = kubectl helm
iac = terraform ansible
cloud = awscli
monitoring = prometheus-node-exporter
networking = curl wget nmap mtr

[dotfiles]
source = profiles/full/

[services]
enable = sshd docker
