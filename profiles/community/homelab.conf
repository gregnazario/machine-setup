# Profile: homelab
# Home server and self-hosting

[profile]
name = homelab
description = Home server with Docker, monitoring, networking, and backup tools
extends = selfhosted

[packages]
monitoring = btop htop iotop nethogs
networking = tailscale curl wget nmap mtr iperf3
storage = smartmontools hdparm
backup = restic rsync borgbackup

[dotfiles]
source = profiles/selfhosted/

[services]
enable = sshd docker tailscaled
