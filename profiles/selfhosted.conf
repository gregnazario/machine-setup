# Profile: selfhosted
# Self-hosted services stack - Docker Compose based

[profile]
name = selfhosted
description = Self-hosted server with containerized services via Docker Compose
extends = minimal

[packages]
devops = docker docker-compose
networking = tailscale curl wget
monitoring = btop htop
utilities = jq rsync
backup = restic

[dotfiles]
source = profiles/selfhosted/

[dotfiles.links.1]
src = .config/nushell/
dest = ~/.config/nushell/

[dotfiles.links.2]
src = .config/nvim/
dest = ~/.config/nvim/

[dotfiles.links.3]
src = .gitconfig
dest = ~/.gitconfig

[dotfiles.links.4]
src = .ssh/config
dest = ~/.ssh/config

[dotfiles.links.5]
src = docker/
dest = ~/selfhosted/

[services]
enable = sshd docker tailscaled

[setup_scripts]
run = scripts/setup-ssh-agent.sh
run = scripts/setup-docker.sh
run = scripts/setup-selfhosted.sh
