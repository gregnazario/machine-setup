# Profile: full
# Complete development environment with all tools and utilities

[profile]
name = full
description = Complete development environment with all tools and utilities
extends = minimal

[packages]
multiplexer = zellij
cli_modern = bat eza dust bottom procs
utilities = jq httpie doggo gping rsync yazi ouch asciinema glow fastfetch
security = pass
languages = python3 rustup
git = gh
devops = docker kubectl

[dotfiles]
source = profiles/full/

[dotfiles.links.1]
src = shell/.config/nushell/
dest = ~/.config/nushell/

[dotfiles.links.2]
src = editors/.config/nvim/
dest = ~/.config/nvim/

[dotfiles.links.3]
src = multiplexer/.config/zellij/
dest = ~/.config/zellij/

[dotfiles.links.4]
src = cli/.config/bat/
dest = ~/.config/bat/

[dotfiles.links.5]
src = cli/.config/bottom/
dest = ~/.config/bottom/

[dotfiles.links.6]
src = cli/.config/glow/
dest = ~/.config/glow/

[dotfiles.links.7]
src = git/.gitconfig
dest = ~/.gitconfig

[dotfiles.links.8]
src = dev/.config/mise/
dest = ~/.config/mise/

[dotfiles.links.9]
src = .ssh/
dest = ~/.ssh/

[services]
enable = sshd docker

[setup_scripts]
run = scripts/setup-ssh-agent.sh
run = scripts/setup-docker.sh
